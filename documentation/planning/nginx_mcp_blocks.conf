# MCP Server nginx location blocks
# Add these inside the existing HTTPS server block in /etc/nginx/sites-available/assist-chat.site
# After the existing location blocks (e.g., after the main Flask proxy_pass location)
#
# Deploy: copy these blocks into the server { ... } block and run:
#   sudo nginx -t && sudo systemctl reload nginx

    # Web Search MCP (port 8100)
    location /mcp/search/ {
        proxy_pass http://127.0.0.1:8100/;
        proxy_buffering off;
        proxy_read_timeout 300s;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

